name: Daily Report

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python main.py

      - name: Build static site
        run: python scripts/build_static_site.py

      - name: Commit updated report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update daily market report"
          file_pattern: output/latest-report.json
